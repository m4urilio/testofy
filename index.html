<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testofy</title>
  <meta name="description" content="Your complete guide. Chapters, checklists and actionable content." />
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header id="topbar">
    <div class="topbar__inner">
      <button class="topbar__menu-btn" id="menu-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar__logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#lg-logo)"/>
          <text x="14" y="20" font-family="Inter,sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">T</text>
          <defs>
            <linearGradient id="lg-logo" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#FF6B2B"/>
              <stop offset="100%" stop-color="#DC2626"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="topbar__title">Testofy</span>
      </div>
      <div class="topbar__progress-wrap" title="Overall progress">
        <div class="topbar__progress-ring">
          <svg width="36" height="36" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="14" fill="none" stroke="#F0F0F0" stroke-width="3"/>
            <circle cx="18" cy="18" r="14" fill="none" stroke="url(#pg-grad)" stroke-width="3"
                    stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="88"
                    id="progress-ring-circle" transform="rotate(-90 18 18)"/>
            <defs>
              <linearGradient id="pg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FF6B2B"/>
                <stop offset="100%" stop-color="#DC2626"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="topbar__progress-pct" id="progress-pct">0%</span>
        </div>
      </div>
    </div>
    <!-- Chapter progress bar -->
    <div class="topbar__bar">
      <div class="topbar__bar-fill" id="chapter-bar"></div>
    </div>
  </header>

  <!-- ===== SIDEBAR / DRAWER ===== -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <div class="sidebar__logo">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#lg-logo2)"/>
          <text x="14" y="20" font-family="Inter,sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">T</text>
          <defs>
            <linearGradient id="lg-logo2" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#FF6B2B"/>
              <stop offset="100%" stop-color="#DC2626"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <div class="sidebar__book-title">Testofy</div>
          <div class="sidebar__book-sub">Your complete guide</div>
        </div>
      </div>
      <button class="sidebar__close" id="sidebar-close" aria-label="Close menu">✕</button>
    </div>

    <!-- Overall progress -->
    <div class="sidebar__progress">
      <div class="sidebar__progress-label">
        <span>Overall Progress</span>
        <span id="sidebar-pct">0%</span>
      </div>
      <div class="sidebar__progress-track">
        <div class="sidebar__progress-fill" id="sidebar-bar"></div>
      </div>
    </div>

    <!-- Chapter list -->
    <nav class="sidebar__nav" id="sidebar-nav">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main" id="main">

    <!-- WELCOME SCREEN -->
    <section class="screen screen--welcome active" id="screen-welcome">
      <div class="welcome">
        <div class="welcome__badge">Complete Guide</div>
        <h1 class="welcome__title">Testofy</h1>
        <p class="welcome__sub">Content is loading. Your chapters, checklists and action items will be here.</p>
        <div class="welcome__stats" id="welcome-stats">
          <!-- Populated by JS -->
        </div>
        <button class="btn btn--primary btn--lg" id="start-btn">
          Start Reading
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </section>

    <!-- CHAPTER SCREEN -->
    <section class="screen screen--chapter" id="screen-chapter">
      <div class="chapter-wrap">

        <!-- Chapter header -->
        <div class="chapter-header">
          <div class="chapter-header__meta">
            <span class="chapter-header__num" id="ch-num">Chapter 1</span>
            <span class="chapter-header__total" id="ch-total">of 1</span>
          </div>
          <h2 class="chapter-header__title" id="ch-title">Chapter Title</h2>
          <p class="chapter-header__desc" id="ch-desc"></p>
        </div>

        <!-- Chapter body -->
        <div class="chapter-body" id="ch-body">
          <!-- Populated by JS from content.js -->
        </div>

        <!-- Chapter navigation -->
        <div class="chapter-nav">
          <button class="btn btn--outline" id="btn-prev">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Previous
          </button>
          <div class="chapter-nav__dots" id="chapter-dots"></div>
          <button class="btn btn--primary" id="btn-next">
            Next
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

      </div>
    </section>

    <!-- COMPLETION SCREEN -->
    <section class="screen screen--complete" id="screen-complete">
      <div class="complete">
        <div class="complete__icon">🏆</div>
        <h2 class="complete__title">You finished it!</h2>
        <p class="complete__sub">You've completed all chapters. Review your checklists and apply what you learned.</p>
        <div class="complete__stats" id="complete-stats"></div>
        <button class="btn btn--primary btn--lg" id="restart-btn">
          Read Again
        </button>
        <button class="btn btn--outline btn--lg" id="review-btn" style="margin-top:12px">
          Review Chapters
        </button>
      </div>
    </section>

  </main>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
